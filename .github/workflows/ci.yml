name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  jumping-rope:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "./jumping-rope[dev]"
      - name: Lint + types
        run: |
          cd jumping-rope
          ruff check .
          mypy --strict jumping_rope
      - name: Tests (zero network)
        run: cd jumping-rope && pytest -q
      - name: Demo
        run: cd jumping-rope && python examples/demo_session.py

  ropebench:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (rope from the sibling dir, not git)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./jumping-rope
          pip install -e ./ropebench --no-deps
          pip install pytest ruff mypy
      - name: Lint + types
        run: |
          cd ropebench
          ruff check .
          mypy --strict ropebench
      - name: Tests (zero network)
        run: cd ropebench && pytest -q
      - name: Scripted sweep smoke
        run: ropebench run --mode scripted --seeds 1 --turns 40

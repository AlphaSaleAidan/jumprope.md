<!doctype html>
<!-- Deterministic demo of the drawn-rope gauge (JROPE_STYLE=drawn).
     setFrame(i) renders frame i exactly (i in 0..TOTAL-1), so a capture
     script can screenshot each frame; open it in a browser and it free-runs
     at 12 fps. The math mirrors statusline.py: same braille swing frames,
     same color stops, same pulse curve. -->
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0b0f17}
  #card{display:inline-block;width:620px;background:#0d1420;border:1px solid #1d2b45;
        border-radius:12px;padding:26px 34px;margin:20px;
        font:24px/1.35 "DejaVu Sans Mono","Noto Sans Mono",monospace;
        white-space:pre;color:#c8d4ea}
  #title{font-size:13px;letter-spacing:.2em;color:#4a5f86;margin-bottom:12px}
</style></head><body>
<div id="card"><div id="title">JUMPING ROPE тАФ LIVE GAUGE</div><div id="line"></div></div>
<script>
// 12 braille frames of one full swing тАФ generated by statusline._rope_frames()
const ROPE = ["таЪтаЙтаЙтаЩ","таЪтаЙтаЙтаЩ","таТтаЪтаЩтаТ","тадтаЦтаТтаж","тадтвдтгатад","твдтгАтгАтга",
              "твдтгАтгАтга","твдтгАтгАтга","тадтвдтгатад","тадтадтадтад","таТтаЪтаЩтаТ","таЪтаЙтаЙтаЩ"];
const TOTAL = 48, FPS = 12, BAR_W = 14, BUDGET = 2000;
const DIM = "#4a5f86";
const STOPS = [[0,[52,211,153]],[.5,[245,200,66]],[.78,[245,158,11]],[1,[239,68,68]]];
const lerp=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
function fillColor(f){f=Math.max(0,Math.min(1,f));
  for(let i=0;i<STOPS.length-1;i++){const[t0,c0]=STOPS[i],[t1,c1]=STOPS[i+1];
    if(f<=t1)return lerp(c0,c1,t1>t0?(f-t0)/(t1-t0):0);}return STOPS[3][1];}
const human=n=>n>=1000?(n/1000).toFixed(1)+"k":""+Math.round(n);
const span=(c,s)=>`<span style="color:${c}">${s}</span>`;
const rgb=c=>`rgb(${c[0]},${c[1]},${c[2]})`;
function setFrame(i){
  const now=i/FPS;
  const fill=.08+(1.08-.08)*(i/(TOTAL-1));          // 8% тЖТ 108%: green тЖТ JUMP!
  const tokens=Math.round(fill*BUDGET);
  const base=fillColor(fill);
  const freq=1.1+Math.min(fill,1.05)*7.5;
  const b=.62+.38*(.5+.5*Math.sin(now*freq));       // the pulse
  const col=rgb(base.map(v=>Math.round(v*b)));
  const rope=ROPE[i%ROPE.length];
  const filled=Math.min(BAR_W,Math.round(Math.min(fill,1)*BAR_W));
  const bar=span(col,"тЦИ".repeat(filled))+span(DIM,"тЦС".repeat(BAR_W-filled));
  const over=" "+`<span style="color:rgb(239,68,68);visibility:${fill>=1?"visible":"hidden"}">JUMP!</span>`;
  const pct=span(col,Math.round(Math.min(fill,1)*100)+"%");
  document.getElementById("line").innerHTML =
    span(col,rope)+" "+bar+" "+span(col,human(tokens))+span(DIM,"/"+human(BUDGET))
    +" "+pct+over+" "+span(DIM,"j4");
}
setFrame(0);
if(!location.hash.includes("still")){let i=0;setInterval(()=>setFrame(i=(i+1)%TOTAL),1000/FPS);}
</script></body></html>

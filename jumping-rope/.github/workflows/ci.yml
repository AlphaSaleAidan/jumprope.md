name: ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Types (mypy --strict on core)
        run: mypy --strict jumping_rope
      - name: Tests (zero network — socket-guarded, bundled tokenizer)
        run: pytest -q
      - name: Demo
        run: python examples/demo_session.py

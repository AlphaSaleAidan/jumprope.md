<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
<rect width="920" height="470" rx="18" fill="#0B1220"/>
<text x="70" y="44" fill="#E7EEF9" font-size="21" font-weight="700">A real model decodes the dense rope a keyword-matcher can't</text>
<text x="70" y="70" fill="#93A4C3" font-size="14">Recall on the same facts, symbolic vs aggressive AI-native coding · the density "floor" only hurts a literal reader</text>
<!-- y axis -->
<line x1="150" y1="400" x2="760" y2="400" stroke="#22314F"/>
<line x1="150" y1="120" x2="150" y2="400" stroke="#22314F"/>
<text x="140" y="404" fill="#93A4C3" font-size="12" text-anchor="end">80%</text>
<line x1="150" y1="330" x2="760" y2="330" stroke="#22314F" stroke-dasharray="3 6"/>
<text x="140" y="334" fill="#93A4C3" font-size="12" text-anchor="end">85%</text>
<line x1="150" y1="260" x2="760" y2="260" stroke="#22314F" stroke-dasharray="3 6"/>
<text x="140" y="264" fill="#93A4C3" font-size="12" text-anchor="end">90%</text>
<line x1="150" y1="190" x2="760" y2="190" stroke="#22314F" stroke-dasharray="3 6"/>
<text x="140" y="194" fill="#93A4C3" font-size="12" text-anchor="end">95%</text>
<line x1="150" y1="120" x2="760" y2="120" stroke="#22314F" stroke-dasharray="3 6"/>
<text x="140" y="124" fill="#93A4C3" font-size="12" text-anchor="end">100%</text>
<!-- groups: scripted (left), live (right); bars symbolic (blue) vs ai-native (amber/green) -->
<!-- scripted: symbolic 93% -> y=190+ (93-80)/20*280... map 80->400,100->120 => y=400-(v-80)/20*280 -->
<!-- 93 -> 400-13/20*280=400-182=218 ; 83 -> 400-3/20*280=400-42=358 -->
<rect x="250" y="218" width="70" height="182" rx="4" fill="#60A5FA"/>
<text x="285" y="208" fill="#60A5FA" font-size="17" font-weight="700" text-anchor="middle">93%</text>
<rect x="330" y="358" width="70" height="42" rx="4" fill="#F59E0B"/>
<text x="365" y="348" fill="#F59E0B" font-size="17" font-weight="700" text-anchor="middle">83%</text>
<text x="325" y="428" fill="#E7EEF9" font-size="17" font-weight="700" text-anchor="middle">scripted (literal matcher)</text>
<text x="325" y="450" fill="#EF4444" font-size="13" text-anchor="middle">−10% on AI-native ↓</text>
<!-- live: symbolic 100 -> 120 ; ai-native 100 -> 120 -->
<rect x="560" y="120" width="70" height="280" rx="4" fill="#60A5FA"/>
<text x="595" y="110" fill="#60A5FA" font-size="17" font-weight="700" text-anchor="middle">100%</text>
<rect x="640" y="120" width="70" height="280" rx="4" fill="#F59E0B"/>
<text x="675" y="110" fill="#F59E0B" font-size="17" font-weight="700" text-anchor="middle">100%</text>
<text x="635" y="428" fill="#E7EEF9" font-size="17" font-weight="700" text-anchor="middle">live model (reads the legend)</text>
<text x="635" y="450" fill="#34D399" font-size="13" text-anchor="middle">+0% — decodes it, no loss ✓</text>
<!-- legend -->
<rect x="250" y="92" width="16" height="16" rx="3" fill="#60A5FA"/><text x="274" y="105" fill="#93A4C3" font-size="13">symbolic-en</text>
<rect x="390" y="92" width="16" height="16" rx="3" fill="#F59E0B"/><text x="414" y="105" fill="#93A4C3" font-size="13">AI-native (coded)</text>
</svg>

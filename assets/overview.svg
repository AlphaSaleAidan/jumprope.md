<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
<rect width="960" height="460" rx="18" fill="#0B1220"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#5B708F"/></marker>
                <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#3B82F6"/></marker></defs>
<text x="480" y="46" fill="#E7EEF9" font-size="19" font-weight="700" text-anchor="middle">The chat is disposable. The ledger is not.</text>
<text x="480" y="68" fill="#93A4C3" font-size="13.5" font-weight="600" text-anchor="middle">clear the conversation whenever you like — nothing lives only in it</text>
<rect x="40" y="130" width="205" height="150" rx="12" fill="#111C33" stroke="#2A3B5F"/>
<rect x="40" y="130" width="5" height="150" rx="2.5" fill="#F59E0B"/>
<circle cx="66" cy="157" r="5" fill="#F59E0B"/>
<text x="80" y="162" fill="#E7EEF9" font-size="16" font-weight="700" letter-spacing="1">CHAT HISTORY</text>
<text x="66" y="188" fill="#93A4C3" font-size="13.5">grows every turn</text>
<text x="66" y="207" fill="#93A4C3" font-size="13.5">mostly filler</text>
<text x="66" y="226" fill="#93A4C3" font-size="13.5">safe to erase</text>
<rect x="327" y="112" width="286" height="171" rx="15" fill="none" stroke="#3B82F6" stroke-opacity="0.35" stroke-width="6"/>
<rect x="330" y="115" width="280" height="165" rx="12" fill="#111C33" stroke="#2A3B5F"/>
<rect x="330" y="115" width="5" height="165" rx="2.5" fill="#3B82F6"/>
<circle cx="356" cy="142" r="5" fill="#3B82F6"/>
<text x="370" y="147" fill="#E7EEF9" font-size="16" font-weight="700" letter-spacing="1">THE ROPE</text>
<text x="356" y="173" fill="#93A4C3" font-size="13.5">a small, dense ledger:</text>
<text x="356" y="192" fill="#93A4C3" font-size="13.5">facts · decisions · goals</text>
<text x="356" y="211" fill="#93A4C3" font-size="13.5">open threads · vault index</text>
<text x="356" y="230" fill="#93A4C3" font-size="13.5">the ONLY carried context</text>
<rect x="700" y="130" width="220" height="130" rx="12" fill="#111C33" stroke="#2A3B5F"/>
<rect x="700" y="130" width="5" height="130" rx="2.5" fill="#34D399"/>
<circle cx="726" cy="157" r="5" fill="#34D399"/>
<text x="740" y="162" fill="#E7EEF9" font-size="16" font-weight="700" letter-spacing="1">THE MODEL</text>
<text x="726" y="188" fill="#93A4C3" font-size="13.5">resumes any time</text>
<text x="726" y="207" fill="#93A4C3" font-size="13.5">from the rope alone</text>
<rect x="385" y="350" width="340" height="90" rx="12" fill="#111C33" stroke="#2A3B5F"/>
<rect x="385" y="350" width="5" height="90" rx="2.5" fill="#A78BFA"/>
<circle cx="411" cy="377" r="5" fill="#A78BFA"/>
<text x="425" y="382" fill="#E7EEF9" font-size="16" font-weight="700" letter-spacing="1">THE VAULT</text>
<text x="411" y="408" fill="#93A4C3" font-size="13.5">every removed detail, word-for-word · searchable</text>
<line x1="245" y1="215" x2="326" y2="215" stroke="#5B708F" stroke-width="2" marker-end="url(#arr)"/>
<text x="283" y="185" fill="#93A4C3" font-size="12" font-weight="600" text-anchor="middle">what matters,</text><text x="283" y="200" fill="#93A4C3" font-size="12" font-weight="600" text-anchor="middle">written tight</text>
<line x1="610" y1="195" x2="696" y2="195" stroke="#3B82F6" stroke-width="3.5" marker-end="url(#arrB)"/>
<text x="653" y="160" fill="#3B82F6" font-size="12" font-weight="700" text-anchor="middle">carried</text><text x="653" y="175" fill="#3B82F6" font-size="12" font-weight="700" text-anchor="middle">every turn</text>
<line x1="470" y1="280" x2="500" y2="346" stroke="#5B708F" stroke-width="2" marker-end="url(#arr)"/>
<text x="430" y="320" fill="#93A4C3" font-size="12.5" font-weight="600" text-anchor="middle">overflow</text>
<line x1="800" y1="260" x2="650" y2="368" stroke="#5B708F" stroke-width="2" stroke-dasharray="4 6" marker-end="url(#arr)"/>
<text x="800" y="312" fill="#93A4C3" font-size="12.5" font-weight="600" text-anchor="start">lookup old detail</text>
<text x="800" y="328" fill="#93A4C3" font-size="12.5" font-weight="600" text-anchor="start">only when needed</text>
</svg>
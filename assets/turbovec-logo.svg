<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="tvg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#8B7CF6"/>
    </linearGradient>
  </defs>
  <!-- icon tile -->
  <rect x="8" y="16" width="64" height="64" rx="16" fill="#0f1b30" stroke="url(#tvg)" stroke-width="2"/>
  <!-- turbo chevrons (speed) -->
  <path d="M26 36 L40 48 L26 60" fill="none" stroke="url(#tvg)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42 36 L56 48 L42 60" fill="none" stroke="#7CF0C2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- vector nodes -->
  <circle cx="24" cy="26" r="2.6" fill="#8B7CF6"/>
  <circle cx="58" cy="70" r="2.6" fill="#60A5FA"/>
  <!-- wordmark -->
  <text x="90" y="60" font-size="42" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#E7EEF9">Turbo</tspan><tspan fill="url(#tvg)">Vec</tspan>
  </text>
  <text x="92" y="82" font-size="14" font-weight="600" letter-spacing="3" fill="#6B7EA6">VECTOR STORE · TIER 2</text>
</svg>

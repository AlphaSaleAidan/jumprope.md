<text x="786" y="228" fill="#93A4C3" font-size="11.5" font-weight="600" text-anchor="start">lookup by key</text>
<line x1="302" y1="240" x2="346" y2="240" stroke="#3B82F6" stroke-width="3.5" marker-end="url(#arrB)"/>
<line x1="612" y1="240" x2="656" y2="240" stroke="#3B82F6" stroke-width="3.5" marker-end="url(#arrB)"/>
<text x="480" y="424" fill="#93A4C3" font-size="12.5" font-weight="600" text-anchor="middle">In UNBOUND mode the same erase happens continuously — one message at a time, the moment it is saved.</text>
